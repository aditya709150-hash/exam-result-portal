<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTCHA Verification</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header>

<div class="top-header">

<h1>NATIONAL ELIGIBILITY CUM ENTRANCE TEST (UG) - 2026</h1>

<h2>Score Card Verification</h2>

</div>

</header>

<main>

<div class="welcome-box">

<h3>Security Verification</h3>

<p>Please enter the CAPTCHA shown below.</p>

<div class="captcha-box" id="captcha"></div>

<input
type="text"
id="captchaInput"
placeholder="Enter CAPTCHA">

<button onclick="checkCaptcha()">

Submit

</button>

<br><br>

<button onclick="generateCaptcha()">

Refresh CAPTCHA

</button>

<p id="message" class="error"></p>

</div>

</main>

<script src="assets/js/captcha.js"></script>

</body>

</html>
